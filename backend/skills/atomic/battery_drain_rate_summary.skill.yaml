# =============================================================================
# Battery Drain Rate Summary
# =============================================================================
# Window-level battery counter trend. This is not rail attribution; it measures
# whether the trace window has enough battery samples to estimate drain.

name: battery_drain_rate_summary
version: "1.0"
type: atomic
category: power
tier: B

meta:
  display_name: "掉电速率摘要"
  description: "基于 battery counters 计算窗口掉电速率、电流/电压摘要和充电不可判定状态"
  icon: "battery_alert"
  tags: [battery, drain, current, voltage, power, atomic]

triggers:
  keywords:
    zh: [掉电速率, 电池电流, 电池电压, 充电, USB, battery drain]
    en: [battery drain rate, current, voltage, charging, USB]
  patterns:
    - ".*(掉电|电池).*(速率|电流|电压).*"
    - ".*battery.*(drain|current|voltage).*"

prerequisites:
  modules:
    - android.battery

inputs:
  - name: start_ts
    type: timestamp
    required: false
    description: "分析起始时间戳(ns)"
  - name: end_ts
    type: timestamp
    required: false
    description: "分析结束时间戳(ns)"

steps:
  - id: drain_rate
    type: atomic
    name: "掉电速率摘要"
    display:
      level: summary
      layer: overview
      title: "掉电速率摘要"
      columns:
        - name: sample_count
          label: "样本数"
          type: number
        - name: duration_sec
          label: "窗口时长(秒)"
          type: number
          format: compact
        - name: capacity_delta_pct
          label: "电量变化(%)"
          type: percentage
        - name: drain_pct_per_hour
          label: "掉电(%/h)"
          type: number
          format: compact
        - name: charge_delta_uah
          label: "电荷变化(uAh)"
          type: number
          format: compact
        - name: avg_current_ua
          label: "平均电流(uA)"
          type: number
          format: compact
        - name: avg_voltage_uv
          label: "平均电压(uV)"
          type: number
          format: compact
        - name: avg_power_mw
          label: "平均功率(mW)"
          type: number
          format: compact
        - name: charging_state
          label: "充电状态"
          type: string
        - name: source_level
          label: "数据来源"
          type: string
    sql: |
      WITH samples AS (
        SELECT *
        FROM android_battery_charge
        WHERE ts >= COALESCE(${start_ts}, trace_start())
          AND ts < COALESCE(${end_ts}, trace_end())
      ),
      ranked AS (
        SELECT
          *,
          ROW_NUMBER() OVER (ORDER BY ts ASC) AS rn_first,
          ROW_NUMBER() OVER (ORDER BY ts DESC) AS rn_last
        FROM samples
      ),
      summary AS (
        SELECT
          COUNT(*) AS sample_count,
          MIN(ts) AS first_ts,
          MAX(ts) AS last_ts,
          MAX(CASE WHEN rn_first = 1 THEN capacity_percent END) AS first_capacity_pct,
          MAX(CASE WHEN rn_last = 1 THEN capacity_percent END) AS last_capacity_pct,
          MAX(CASE WHEN rn_first = 1 THEN charge_uah END) AS first_charge_uah,
          MAX(CASE WHEN rn_last = 1 THEN charge_uah END) AS last_charge_uah,
          AVG(current_ua) AS avg_current_ua,
          AVG(current_avg_ua) AS avg_current_avg_ua,
          AVG(voltage_uv) AS avg_voltage_uv,
          AVG(power_mw) AS avg_power_mw,
          SUM(CASE WHEN current_ua > 0 OR current_avg_ua > 0 THEN 1 ELSE 0 END) AS positive_current_samples
        FROM ranked
      )
      SELECT
        sample_count,
        ROUND((last_ts - first_ts) / 1e9, 2) AS duration_sec,
        ROUND(first_capacity_pct - last_capacity_pct, 4) AS capacity_delta_pct,
        ROUND((first_capacity_pct - last_capacity_pct) * 3600.0 / NULLIF((last_ts - first_ts) / 1e9, 0), 4) AS drain_pct_per_hour,
        ROUND(first_charge_uah - last_charge_uah, 2) AS charge_delta_uah,
        ROUND(COALESCE(avg_current_avg_ua, avg_current_ua), 2) AS avg_current_ua,
        ROUND(avg_voltage_uv, 2) AS avg_voltage_uv,
        ROUND(avg_power_mw, 2) AS avg_power_mw,
        CASE
          WHEN sample_count < 2 THEN 'insufficient_samples'
          WHEN positive_current_samples > 0 THEN 'charging_or_usb_detected'
          ELSE 'discharging_or_unknown_sign'
        END AS charging_state,
        'battery_counter_trend' AS source_level
      FROM summary

output:
  format: structured
