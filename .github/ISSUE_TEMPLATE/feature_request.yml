name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We appreciate your ideas for improving SmartPerfetto.

        If you are using an AI assistant to draft this request, ask it to read
        `AGENTS.md` and the relevant docs under `docs/architecture/` and
        `docs/reference/` first.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: When analyzing traces, I often need to...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - New Analysis Skill
        - Existing Skill Enhancement
        - Agent Reasoning / Strategy
        - MCP Tool / Runtime
        - CLI / Automation
        - Frontend / UI
        - Reports / Snapshots / Export
        - Code-Aware Analysis
        - Performance / Scalability
        - Developer Experience
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've thought about?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, trace examples, or references that help explain the request

  - type: textarea
    id: product-surfaces
    attributes:
      label: Affected Product Surfaces
      description: If known, which surfaces should this feature work in?
      placeholder: |
        Web UI:
        CLI:
        Docker / portable:
        HTTP/SSE API:
        Reports / snapshots:
        Claude runtime:
        OpenAI runtime:
